<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦐 虾虾侦探第一集：消失的蟹黄包</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --header-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-color: #333;
            --text-secondary: #666;
            --shadow: 0 20px 60px rgba(0,0,0,0.3);
            --btn-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --header-gradient: linear-gradient(135deg, #4a1c40 0%, #2d1b4e 100%);
            --card-bg: rgba(30, 30, 50, 0.95);
            --text-color: #e0e0e0;
            --text-secondary: #a0a0a0;
            --shadow: 0 20px 60px rgba(0,0,0,0.5);
            --btn-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .game-container {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow);
            max-width: 800px;
            width: 100%;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        
        .header {
            background: var(--header-gradient);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .theme-toggle,
        .music-control {
            position: absolute;
            top: 15px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1.2em;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .theme-toggle {
            right: 15px;
        }

        .music-control {
            left: 15px;
        }

        .theme-toggle:hover,
        .music-control:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .header .emoji {
            font-size: 3em;
            display: block;
            margin-bottom: 10px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .score-board {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 15px;
            display: inline-block;
            margin-top: 10px;
            font-size: 0.9em;
        }

        .score-item {
            margin: 0 10px;
            display: inline-block;
        }

        .score-value {
            font-weight: bold;
            font-size: 1.2em;
        }
        
        .story-area {
            padding: 40px;
            min-height: 400px;
        }

        @media (max-width: 600px) {
            .story-area {
                padding: 15px;
            }
            .header h1 {
                font-size: 1.5em;
            }
            .header .emoji {
                font-size: 2em;
            }
            .choice-btn {
                padding: 20px 20px;
                font-size: 1.05em;
            }
            .theme-toggle,
            .music-control {
                padding: 10px 14px;
                font-size: 1.3em;
            }
        }
        
        .scene-title {
            font-size: 1.3em;
            color: #667eea;
            margin-bottom: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        [data-theme="dark"] .scene-title {
            color: #a5b4fc;
        }
        
        .story-text {
            font-size: 1.1em;
            line-height: 1.8;
            color: var(--text-color);
            margin-bottom: 30px;
        }
        
        .story-text p {
            margin-bottom: 15px;
        }
        
        .choices {
            display: grid;
            gap: 15px;
        }
        
        .choice-btn {
            background: var(--header-gradient);
            color: white;
            border: none;
            padding: 18px 25px;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            position: relative;
            overflow: hidden;
            width: 100%;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .choice-btn:before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .choice-btn:hover:before {
            left: 100%;
        }
        
        .choice-btn:hover {
            transform: translateY(-3px);
            box-shadow: var(--btn-shadow);
        }
        
        .choice-btn:active {
            transform: translateY(-1px);
        }
        
        .clue-box {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
            animation: slideIn 0.5s ease;
        }

        [data-theme="dark"] .clue-box {
            background: rgba(255, 193, 7, 0.1);
            border-left-color: #ffb300;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .clue-box h4 {
            color: #856404;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        [data-theme="dark"] .clue-box h4 {
            color: #ffd54f;
        }
        
        .clue-list {
            list-style: none;
        }
        
        .clue-list li {
            padding: 5px 0;
            color: #856404;
            position: relative;
            padding-left: 25px;
        }

        [data-theme="dark"] .clue-list li {
            color: #ffe082;
        }

        .clue-list li:before {
            content: "🔍";
            position: absolute;
            left: 0;
        }
        
        .suspect-card {
            background: rgba(248, 249, 250, 0.8);
            border: 2px solid #dee2e6;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        [data-theme="dark"] .suspect-card {
            background: rgba(50, 50, 70, 0.8);
            border-color: #4a4a6a;
        }

        .suspect-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .suspect-avatar {
            font-size: 3em;
            float: left;
            margin-right: 15px;
            animation: sway 3s infinite;
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }
        
        .suspect-card h4 {
            color: #495057;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        [data-theme="dark"] .suspect-card h4 {
            color: #e0e0e0;
        }

        .ending {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            animation: fadeIn 1s ease;
        }

        [data-theme="dark"] .ending {
            background: linear-gradient(135deg, #2d5a5a 0%, #5a2d3a 100%);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .ending h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        [data-theme="dark"] .ending h2 {
            color: #a5b4fc;
        }
        
        .rating {
            font-size: 2em;
            margin: 20px 0;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .restart-btn {
            background: var(--header-gradient);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(240, 147, 251, 0.4);
        }
        
        .highlight {
            background: yellow;
            padding: 2px 5px;
            border-radius: 3px;
            font-weight: bold;
            animation: highlight 2s infinite;
        }

        [data-theme="dark"] .highlight {
            background: rgba(255, 255, 0, 0.3);
        }

        @keyframes highlight {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .music-control {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1.2em;
            transition: all 0.3s ease;
        }

        .music-control:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }

        .next-episode {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            text-align: center;
        }

        .next-episode h3 {
            margin-bottom: 10px;
        }

        .next-episode button {
            background: white;
            color: #667eea;
            border: none;
            padding: 10px 30px;
            border-radius: 20px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .next-episode button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <button class="music-control" onclick="toggleMusic()" title="背景音乐">🎵</button>
            <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
            <span class="emoji">🦐🔍</span>
            <h1>虾虾侦探</h1>
            <p>第一集：消失的蟹黄包</p>
            
            <div class="score-board">
                <span class="score-item">🔍 线索：<span class="score-value" id="clueCount">0</span></span>
                <span class="score-item">⭐ 评分：<span class="score-value" id="scoreValue">100</span></span>
                <span class="score-item">🏆 评级：<span class="score-value" id="rankValue">新手</span></span>
            </div>
        </div>
        
        <div class="story-area" id="storyArea">
            <!-- 动态内容将在这里显示 -->
        </div>
    </div>

    <!-- 音效使用 Web Audio API 生成，无需外部文件 -->

    <script>
        // 游戏状态
        let gameState = {
            currentScene: 'start',
            score: 100,
            clues: 0,
            choices: [],
            perfectRoute: false
        };

        // 主题切换
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            
            const btn = document.querySelector('.theme-toggle');
            btn.textContent = newTheme === 'dark' ? '☀️' : '🌙';
            
            // 保存用户偏好
            localStorage.setItem('theme', newTheme);
            
            playSound('click');
        }

        // 初始化主题
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            const btn = document.querySelector('.theme-toggle');
            btn.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
        }

        // 音乐控制
        let musicPlaying = false;
        function toggleMusic() {
            const btn = document.querySelector('.music-control');
            
            if (musicPlaying) {
                stopMusic();
                btn.textContent = '🎵';
                btn.style.background = 'rgba(255,255,255,0.2)';
            } else {
                startMusic();
                btn.textContent = '⏸️';
                btn.style.background = 'rgba(255,255,255,0.4)';
            }
            musicPlaying = !musicPlaying;
        }

        // Web Audio API 生成背景音乐
        let audioContext = null;
        let musicOscillators = [];
        let musicInterval = null;

        function startMusic() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // 更好的背景音乐：轻柔的琶音（C大调）
                const notes = [
                    523.25, 659.25, 783.99, 1046.50,  // C E G C (高音)
                    392.00, 493.88, 587.33, 783.99    // G B D G
                ];
                let noteIndex = 0;
                
                musicInterval = setInterval(() => {
                    const freq = notes[noteIndex % notes.length];
                    const velocity = 0.05 + Math.random() * 0.05; // 轻柔的音量
                    playNote(freq, 0.6, velocity);
                    noteIndex++;
                }, 400); // 每个音符 400ms
                
            } catch (e) {
                console.log('音频播放需要用户交互');
            }
        }

        function stopMusic() {
            if (musicInterval) {
                clearInterval(musicInterval);
                musicInterval = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
        }

        // 生成单个音符
        function playNote(frequency, duration, volume) {
            if (!audioContext) return;
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = frequency;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(volume, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        // 播放音效（使用 Web Audio API）
        function playSound(type = 'click') {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = ctx.createOscillator();
                const gainNode = ctx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(ctx.destination);
                
                if (type === 'click') {
                    // 点击音效 - 短促的高音
                    oscillator.frequency.value = 800;
                    oscillator.type = 'sine';
                    gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                    oscillator.start(ctx.currentTime);
                    oscillator.stop(ctx.currentTime + 0.1);
                } else if (type === 'success') {
                    // 成功音效 - 上升的音阶
                    [523.25, 659.25, 783.99].forEach((freq, i) => {
                        setTimeout(() => playNote(freq, 0.2, 0.15), i * 100);
                    });
                } else if (type === 'error') {
                    // 错误音效 - 下降的音阶
                    [783.99, 659.25, 523.25].forEach((freq, i) => {
                        setTimeout(() => playNote(freq, 0.2, 0.1), i * 100);
                    });
                }
                
                setTimeout(() => ctx.close(), 500);
            } catch (e) {
                console.log('音效播放失败:', e);
            }
        }

        // 更新分数
        function updateScore(points, clueFound = false) {
            gameState.score += points;
            if (clueFound) {
                gameState.clues++;
                const clueEl = document.getElementById('clueCount');
                if (clueEl) clueEl.textContent = gameState.clues;
            }
            
            // 限制分数范围
            gameState.score = Math.max(0, Math.min(100, gameState.score));
            const scoreEl = document.getElementById('scoreValue');
            if (scoreEl) scoreEl.textContent = gameState.score;
            
            // 更新评级
            updateRank();
        }

        function updateRank() {
            const rankEl = document.getElementById('rankValue');
            if (!rankEl) return;
            const score = gameState.score;
            let rank = '新手';
            if (score >= 90) rank = '🏆 S 级侦探';
            else if (score >= 80) rank = '🥇 A 级侦探';
            else if (score >= 70) rank = '🥈 B 级侦探';
            else if (score >= 60) rank = '🥉 C 级侦探';
            else rank = '📚 实习侦探';
            
            document.getElementById('rankValue').textContent = rank;
        }

        // 游戏剧情数据
        const storyData = {
            start: {
                scene: "🌅 早晨 7:00，上海徐汇区某小区",
                text: `
                    <p>你是<strong>"虾虾侦探"</strong>，一只穿着风衣、戴着猎鹿帽的拟人化龙虾🦐。</p>
                    <p>今天是你开业第一天，就接到了第一个案子：</p>
                    <p class="highlight">"王阿姨的蟹黄包神秘消失了！"</p>
                    <p>王阿姨说："我明明把刚蒸好的蟹黄包放在厨房桌子上，去阳台收了个衣服的功夫，回来就不见了！家里只有三个'人'..."</p>
                    
                    <h3 style="margin: 20px 0 10px;">【嫌疑人列表】（点击查看详情）</h3>
                    <div class="suspect-card" onclick="playSound('click')">
                        <span class="suspect-avatar">🦀</span>
                        <h4>螃蟹大叔</h4>
                        <p>王阿姨的邻居 | 平时就爱蹭吃蹭喝，今天鬼鬼祟祟的</p>
                    </div>
                    <div class="suspect-card" onclick="playSound('click')">
                        <span class="suspect-avatar">🐙</span>
                        <h4>章鱼小哥</h4>
                        <p>外卖员 | 正在给王阿姨送快递，有机会下手</p>
                    </div>
                    <div class="suspect-card" onclick="playSound('click')">
                        <span class="suspect-avatar">🐟</span>
                        <h4>金鱼妹妹</h4>
                        <p>王阿姨的宠物 | 虽然小，但也不是完全没可能...</p>
                    </div>
                `,
                choices: [
                    { text: "A) 去厨房查看案发现场，寻找线索", next: "scene_a", score: 5 },
                    { text: "B) 询问王阿姨更多细节", next: "scene_b", score: 10 },
                    { text: "C) 审问三个嫌疑人", next: "scene_c", score: 0 }
                ]
            },
            
            scene_b: {
                scene: "📍 场景：王阿姨家的客厅",
                text: `
                    <p>你拿出小本本，开始询问王阿姨。</p>
                    <p><strong>你：</strong>"王阿姨，您能详细说说当时的情况吗？"</p>
                    <p><strong>王阿姨</strong>（一边擦眼泪一边说）："哎呀，虾虾侦探啊，事情是这样的...今天早上 6 点半，我蒸了一笼蟹黄包，一共<strong>6 个</strong>，个个皮薄馅大！7 点整，我把包子端到厨房桌子上，想着去阳台收个衣服，前后也就<strong>3 分钟</strong>吧。结果回来一看——<strong>盘子空了！</strong>连个渣都没剩下！"</p>
                    <p><strong>你：</strong>"那这 3 分钟里，您听到什么动静了吗？"</p>
                    <p><strong>王阿姨：</strong>"嗯...我想想...好像听到厨房传来'窸窸窣窣'的声音，还有...一股<strong>海鲜腥味</strong>！"</p>
                    
                    <div class="clue-box">
                        <h4>🔍 获得新线索 (+10 分)</h4>
                        <ul class="clue-list">
                            <li>时间窗口：案发时间仅 3 分钟（7:00-7:03）</li>
                            <li>气味线索：现场有海鲜腥味</li>

                            <li>可疑细节：金鱼缸的盖子今天是开着的！</li>
                        </ul>
                    </div>
                `,
                choices: [
                    { text: "A) 去厨房仔细勘察现场", next: "scene_a", score: 5 },
                    { text: "B) 审问螃蟹大叔", next: "scene_crab", score: 0 },

                    { text: "D) 检查金鱼缸", next: "scene_fish", score: 5 }
                ],
                onEnter: () => updateScore(10, true)
            },
            
            scene_a: {
                scene: "📍 场景：王阿姨家的厨房",
                text: `

        // 渲染场景
        function renderScene(sceneId) {
            const scene = storyData[sceneId];
            const storyArea = document.getElementById('storyArea');
            
            let html = `
                <div class="scene-title">${scene.scene}</div>
                <div class="story-text">${scene.text}</div>
            `;
            
            if (scene.choices && scene.choices.length > 0) {
                html += '<div class="choices">';
                scene.choices.forEach((choice, index) => {
                    html += `<button class="choice-btn" onclick="handleChoice('${choice.next}', ${choice.score})">${choice.text}</button>`;
                });
                html += '</div>';
            }
            
            storyArea.innerHTML = html;
            
            // 执行进入回调（在 DOM 渲染后）
            if (scene.onEnter) {
                setTimeout(() => scene.onEnter(), 50);
            }
            
            // 播放音效
            playSound('click');
        }

        // 处理选择（统一入口）
        function handleChoice(nextScene, score) {
            playSound('click');
            goToScene(nextScene, score);
        }

        function goToScene(sceneId, score) {
            gameState.currentScene = sceneId;
            gameState.choices.push(sceneId);
            if (score !== undefined && score !== 0) {
                updateScore(score);
            }
            renderScene(sceneId);
        }

        function restartGame() {
            gameState = {
                currentScene: 'start',
                score: 100,
                clues: 0,
                choices: [],
                perfectRoute: false
            };
            document.getElementById('clueCount').textContent = '0';
            document.getElementById('scoreValue').textContent = '100';
            document.getElementById('rankValue').textContent = '新手';
            renderScene('start');
        }

        // 初始化游戏
        initTheme();
        renderScene('start');
    </script>
