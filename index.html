<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 游戏中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;font-family:Arial,sans-serif;padding:20px}
.container{max-width:1000px;margin:0 auto}
h1{text-align:center;color:#fff;font-size:48px;margin-bottom:20px;text-shadow:0 4px 10px rgba(0,0,0,0.3)}
.subtitle{text-align:center;color:#fff;opacity:0.9;margin-bottom:40px;font-size:18px}
.games{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:30px}
.game-card{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.3);transition:transform 0.3s}
.game-card:hover{transform:translateY(-10px)}
.card-img{height:200px;display:flex;align-items:center;justify-content:center;font-size:80px;background:linear-gradient(135deg,#f093fb,#f5576c)}
.card-body{padding:25px}
.card-title{font-size:24px;margin-bottom:10px;color:#333}
.card-desc{color:#666;margin-bottom:20px;line-height:1.6}
.play-btn{display:block;width:100%;padding:15px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;text-align:center;text-decoration:none;border-radius:10px;font-size:18px;font-weight:bold;transition:opacity 0.3s}
.play-btn:hover{opacity:0.9}
.footer{text-align:center;color:#fff;margin-top:40px;opacity:0.8}
</style>
</head>
<body>
<div class="container">
<h1>🎮 游戏中心</h1>
<p class="subtitle">精选网页游戏，即点即玩！</p>
<div class="games">
<!-- 虾虾侦探 -->
<div class="game-card">
<div class="card-img">🦐🔍</div>
<div class="card-body">
<h3 class="card-title">🦐 虾虾侦探</h3>
<p class="card-desc">文字推理冒险游戏！王阿姨的蟹黄包消失了，找出真凶！6 个结局等你探索。</p>
<a href="index.html" class="play-btn">开始探案 →</a>
</div>
</div>
<!-- 太空射击 -->
<div class="game-card">
<div class="card-img" style="background:linear-gradient(135deg,#00c6ff,#0072ff)">🚀👾</div>
<div class="card-body">
<h3 class="card-title">🚀 太空射击</h3>
<p class="card-desc">经典射击游戏！驾驶飞船击落外星人，炫酷爆炸特效，关卡系统！</p>
<a href="shooter.html" class="play-btn">开始战斗 →</a>
</div>
</div>
</div>
<div class="footer">
<p>© 2026 游戏中心 | 纯网页游戏，无需下载</p>
</div>
</div>
</body>
</html>
