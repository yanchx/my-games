<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>🚀 v3.2 功能测试</title>
<style>
body{background:#000;color:#fff;font-family:Arial;padding:20px}
.test-box{border:2px solid #0ff;padding:20px;margin:20px 0;border-radius:10px}
.btn{padding:10px 20px;background:#0ff;color:#000;border:none;cursor:pointer;margin:5px;font-size:16px}
#invincibleEffect{color:#ff0;font-size:20px;display:none;animation:blink 0.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>
<h1>🚀 v3.2 功能测试页面</h1>

<div class="test-box">
<h2>测试 1: 无敌效果 UI</h2>
<button class="btn" onclick="testInvincible()">显示无敌效果</button>
<div id="invincibleEffect">✨ 无敌中 ✨</div>
<p id="invincibleStatus">状态：未触发</p>
</div>

<div class="test-box">
<h2>测试 2: 音效系统</h2>
<button class="btn" onclick="testShoot()">🔊 测试射击音效</button>
<button class="btn" onclick="testExplosion()">💥 测试爆炸音效</button>
<button class="btn" onclick="testHit()">❤️ 测试受伤音效</button>
<p id="audioStatus">状态：未初始化</p>
</div>

<div class="test-box">
<h2>测试 3: 检查主游戏版本</h2>
<button class="btn" onclick="checkVersion()">📋 检查 GitHub 版本</button>
<pre id="versionInfo" style="background:#111;padding:10px;"></pre>
</div>

<script>
// 测试无敌效果
function testInvincible(){
    const effect = document.getElementById('invincibleEffect');
    const status = document.getElementById('invincibleStatus');
    effect.style.display = 'block';
    status.textContent = '状态：✅ 无敌效果已显示';
    setTimeout(()=>{
        effect.style.display = 'none';
        status.textContent = '状态：无敌效果已隐藏';
    }, 3000);
}

// 音效系统
let audioCtx = null;
function initAudio(){
    if(!audioCtx){
        audioCtx = new (window.AudioContext||window.webkitAudioContext)();
        document.getElementById('audioStatus').textContent = '状态：✅ 音频系统已初始化';
    }
}

function playSound(type){
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    if(type==='shoot'){
        osc.frequency.setValueAtTime(880,audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(110,audioCtx.currentTime+0.1);
        gain.gain.setValueAtTime(0.3,audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.1);
        osc.start();osc.stop(audioCtx.currentTime+0.1);
    }else if(type==='explosion'){
        osc.type='sawtooth';
        osc.frequency.setValueAtTime(100,audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(10,audioCtx.currentTime+0.3);
        gain.gain.setValueAtTime(0.5,audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.3);
        osc.start();osc.stop(audioCtx.currentTime+0.3);
    }else if(type==='hit'){
        osc.type='square';
        osc.frequency.setValueAtTime(200,audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(50,audioCtx.currentTime+0.2);
        gain.gain.setValueAtTime(0.4,audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01,audioCtx.currentTime+0.2);
        osc.start();osc.stop(audioCtx.currentTime+0.2);
    }
}

function testShoot(){initAudio();playSound('shoot');}
function testExplosion(){initAudio();playSound('explosion');}
function testHit(){initAudio();playSound('hit');}

// 检查版本
async function checkVersion(){
    const pre = document.getElementById('versionInfo');
    pre.textContent = '正在加载...';
    try{
        const response = await fetch('shooter.html?t='+Date.now());
        const text = await response.text();
        const hasV32 = text.includes('v3.2');
        const hasInvincible = text.includes('invincibleEffect');
        const hasPlaySound = text.includes('playSound');
        const hasInitAudio = text.includes('initAudio');
        
        pre.textContent = `✅ v3.2 标题：${hasV32?'有':'❌无'}
✅ 无敌效果：${hasInvincible?'有':'❌无'}
✅ 音效函数：${hasPlaySound?'有':'❌无'}
✅ 音频初始化：${hasInitAudio?'有':'❌无'}

完整 URL: https://yanchx.github.io/my-games/shooter.html?t=${Date.now()}`;
    }catch(e){
        pre.textContent = '❌ 检查失败：'+e.message;
    }
}
</script>
</body>
</html>
